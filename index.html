<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title> 儿童食谱（1岁+）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#f0f7f4;
      --bg-accent:linear-gradient(165deg, #f5fbf8 0%, #eef6ff 45%, #faf8f5 100%);
      --text:#334155;
      --muted:#64748b;
      --border:rgba(148, 163, 184, 0.35);
      --panel:rgba(255, 255, 255, 0.92);
      --header:linear-gradient(135deg, #e8f4fc 0%, #f0e8ff 100%);
      --mid:linear-gradient(135deg, #e8faf0 0%, #f0fdf4 100%);
      --bottom:linear-gradient(135deg, #fefce8 0%, #fff7ed 100%);
      --primary:#3b82f6;
      --primary-soft:#dbeafe;
      --danger:#ef4444;
      --shadow:0 4px 24px rgba(15, 23, 42, 0.06);
      --shadow-sm:0 2px 12px rgba(15, 23, 42, 0.04);
      --radius:16px;
      --radius-sm:12px;
      /* 食材库 · 蓝色系 */
      --catalog-surface:linear-gradient(165deg, #f0f9ff 0%, #e0f2fe 38%, #eff6ff 100%);
      --catalog-border:rgba(59, 130, 246, 0.22);
      --catalog-shadow:0 4px 28px rgba(37, 99, 235, 0.07);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:var(--bg-accent);
      background-attachment:fixed;
      color:var(--text);
      font-family:"Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", system-ui, sans-serif;
      font-weight:400;
      font-size:15px;
      line-height:1.55;
      letter-spacing:0.02em;
      -webkit-font-smoothing:antialiased;
    }
    .phone{
      max-width:430px;
      margin:0 auto;
      padding:24px 18px 40px;
      display:flex;
      flex-direction:column;
      gap:20px;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px 18px;
      margin-bottom:0;
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
    }
    .panel.header{
      background:var(--header);
      border-color:rgba(147, 197, 253, 0.35);
    }
    .panel.edit{
      background:var(--mid);
      border-color:rgba(134, 239, 172, 0.35);
    }
    .panel.catalog{
      background:var(--catalog-surface);
      border-color:var(--catalog-border);
      box-shadow:var(--catalog-shadow);
    }
    .panel.catalog .section-title{
      color:#475569;
      font-weight:400;
      letter-spacing:0.06em;
    }
    .title{
      text-align:center;
      font-weight:500;
      font-size:1.05rem;
      letter-spacing:0.06em;
      margin-bottom:4px;
      color:#1e293b;
    }
    .tabs{display:flex;gap:10px;margin-top:14px}
    .tab{
      flex:1;
      border:1px solid var(--border);
      background:rgba(255,255,255,.75);
      border-radius:var(--radius-sm);
      padding:10px 8px;
      text-align:center;
      font-weight:500;
      cursor:pointer;
      font-size:13px;
      letter-spacing:0.04em;
      color:var(--muted);
      transition:background .2s, border-color .2s, color .2s, box-shadow .2s;
    }
    .tab:hover{background:rgba(255,255,255,.95);box-shadow:var(--shadow-sm)}
    .tab.active{
      background:rgba(255,255,255,.95);
      border-color:#93c5fd;
      color:#2563eb;
      box-shadow:var(--shadow-sm);
    }
    .section-title{
      font-size:13px;
      font-weight:500;
      color:var(--muted);
      margin-bottom:12px;
      letter-spacing:0.04em;
    }
    .list{display:flex;flex-direction:column;gap:10px}
    .row{
      border:1px solid var(--border);
      background:rgba(255,255,255,.85);
      border-radius:var(--radius-sm);
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      cursor:pointer;
      transition:box-shadow .2s, border-color .2s;
    }
    .row:hover{box-shadow:var(--shadow-sm)}
    .row.active{border-color:#93c5fd;background:#f8fafc;box-shadow:var(--shadow-sm)}
    .row .left{font-weight:500;font-size:14px}
    .row .right{font-size:12px;font-weight:400;color:var(--muted);text-align:right;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .meal-line{
      font-size:14px;
      font-weight:400;
      line-height:1.65;
      padding:10px 0;
      border-bottom:1px dashed rgba(148, 163, 184, 0.4);
    }
    .meal-line:last-child{border-bottom:none}
    .chips{display:flex;gap:10px;flex-wrap:wrap}
    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(148, 163, 184, 0.45);
      background:rgba(255,255,255,.9);
      font-size:13px;
      font-weight:500;
      box-shadow:var(--shadow-sm);
    }
    .chip .x{border:none;background:none;color:#64748b;cursor:pointer;font-weight:500;padding:0;font-size:14px}
    .tip{
      margin-top:14px;
      padding:12px 14px;
      border-radius:var(--radius-sm);
      border:1px dashed rgba(59, 130, 246, 0.35);
      background:rgba(239, 246, 255, 0.65);
      font-size:12px;
      font-weight:400;
      color:#1d4ed8;
      line-height:1.6;
    }
    .name-block{margin-top:14px;display:flex;flex-direction:column;gap:12px}
    .name-item{font-size:14px;font-weight:400}
    .name-item input{
      width:100%;
      margin-top:6px;
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      padding:11px 14px;
      font-size:14px;
      font-weight:400;
      background:rgba(255,255,255,.9);
      font-family:inherit;
      letter-spacing:0.02em;
    }
    .name-item input::placeholder{color:#94a3b8}
    /* 食材库外通用：仍供其他区域复用（若需） */
    .cat{
      border:1px dashed rgba(148, 163, 184, 0.45);
      border-radius:var(--radius-sm);
      padding:14px;
      background:rgba(255,255,255,.75);
    }
    .cat + .cat{margin-top:14px}
    .cat-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .cat-title{font-weight:500;font-size:14px;letter-spacing:0.03em}
    .cat-items{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .btn-chip{
      border:1px solid rgba(148, 163, 184, 0.4);
      border-radius:var(--radius-sm);
      padding:8px 12px;
      font-size:13px;
      font-weight:500;
      cursor:pointer;
      font-family:inherit;
      letter-spacing:0.02em;
      transition:transform .15s, box-shadow .15s;
    }
    .btn-chip:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm)}
    .cat-add-row{display:flex;gap:10px;align-items:center;margin-top:4px}
    .cat-add-row input{
      flex:1;
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      padding:10px 12px;
      font-size:14px;
      font-weight:400;
      font-family:inherit;
      background:rgba(255,255,255,.95);
    }

    /* —— 食材库：蓝色主调 + 清新字重与按钮底色 —— */
    .panel.catalog .cat{
      border:1px solid rgba(147, 197, 253, 0.5);
      border-radius:14px;
      padding:15px 14px;
      background:rgba(255, 255, 255, 0.78);
      box-shadow:0 2px 14px rgba(37, 99, 235, 0.05);
    }
    .panel.catalog .cat--meat{
      border-left:3px solid #38bdf8;
      background:linear-gradient(135deg, rgba(255,255,255,.88) 0%, rgba(224,242,254,.55) 100%);
    }
    .panel.catalog .cat--veg{
      border-left:3px solid #3b82f6;
      background:linear-gradient(135deg, rgba(255,255,255,.88) 0%, rgba(219,234,254,.5) 100%);
    }
    .panel.catalog .cat--staple{
      border-left:3px solid #6366f1;
      background:linear-gradient(135deg, rgba(255,255,255,.88) 0%, rgba(224,231,255,.45) 100%);
    }
    .panel.catalog .cat-title{
      font-weight:400;
      font-size:14px;
      letter-spacing:0.08em;
      color:#1e40af;
    }
    .panel.catalog .cat-items{
      gap:9px;
      margin-bottom:12px;
    }
    /* 食材名：统一字色；底色按序多色清新交替 */
    .panel.catalog .btn-chip{
      font-weight:400;
      font-size:13px;
      letter-spacing:0.06em;
      color:#475569;
      border:1px solid rgba(148, 163, 184, 0.38);
      border-radius:999px;
      padding:9px 14px;
      background:linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
      box-shadow:0 1px 8px rgba(15, 23, 42, 0.05);
    }
    .panel.catalog .btn-chip:hover{
      transform:translateY(-2px);
      box-shadow:0 4px 14px rgba(15, 23, 42, 0.08);
      border-color:rgba(100, 116, 139, 0.45);
      color:#475569;
    }
    .panel.catalog .cat-items .btn-chip:nth-child(6n+1){
      background:linear-gradient(145deg, #e0f2fe 0%, #bae6fd 100%);
      border-color:rgba(56, 189, 248, 0.35);
    }
    .panel.catalog .cat-items .btn-chip:nth-child(6n+2){
      background:linear-gradient(145deg, #d1fae5 0%, #a7f3d0 100%);
      border-color:rgba(52, 211, 153, 0.35);
    }
    .panel.catalog .cat-items .btn-chip:nth-child(6n+3){
      background:linear-gradient(145deg, #ede9fe 0%, #ddd6fe 100%);
      border-color:rgba(167, 139, 250, 0.35);
    }
    .panel.catalog .cat-items .btn-chip:nth-child(6n+4){
      background:linear-gradient(145deg, #ffedd5 0%, #fed7aa 100%);
      border-color:rgba(251, 146, 60, 0.35);
    }
    .panel.catalog .cat-items .btn-chip:nth-child(6n+5){
      background:linear-gradient(145deg, #fce7f3 0%, #fbcfe8 100%);
      border-color:rgba(244, 114, 182, 0.35);
    }
    .panel.catalog .cat-items .btn-chip:nth-child(6n+6){
      background:linear-gradient(145deg, #fef9c3 0%, #fde68a 100%);
      border-color:rgba(234, 179, 8, 0.35);
    }
    .panel.catalog .cat-add-row input{
      border:1px solid rgba(147, 197, 253, 0.65);
      background:rgba(255, 255, 255, 0.94);
      font-weight:300;
      letter-spacing:0.05em;
      color:#1e293b;
    }
    .panel.catalog .cat-add-row input::placeholder{
      color:#93c5fd;
      font-weight:300;
    }
    .panel.catalog .btn.primary{
      background:linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      border-color:#60a5fa;
      color:#fff;
      font-weight:400;
      letter-spacing:0.06em;
      box-shadow:0 2px 12px rgba(37, 99, 235, 0.25);
    }
    .panel.catalog .btn.primary:hover{
      box-shadow:0 4px 16px rgba(37, 99, 235, 0.32);
    }
    .panel.catalog .hint{
      margin-top:16px;
      background:rgba(239, 246, 255, 0.92);
      border:1px solid rgba(147, 197, 253, 0.55);
      color:#1e3a8a;
      font-weight:300;
      letter-spacing:0.04em;
      line-height:1.7;
    }
    .btn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.9);
      border-radius:var(--radius-sm);
      padding:10px 14px;
      font-weight:500;
      cursor:pointer;
      font-size:13px;
      white-space:nowrap;
      font-family:inherit;
      letter-spacing:0.03em;
      transition:background .2s, box-shadow .2s;
    }
    .btn:hover{box-shadow:var(--shadow-sm)}
    .btn.primary{background:var(--primary-soft);border-color:#93c5fd;color:#1d4ed8}
    .btn.warn{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
    .action-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .hint{
      margin-top:14px;
      padding:12px 14px;
      border-radius:var(--radius-sm);
      font-size:12px;
      font-weight:400;
      background:rgba(255, 251, 235, 0.85);
      border:1px solid rgba(253, 224, 71, 0.45);
      color:#a16207;
      line-height:1.65;
    }
    .hidden{display:none}

    /* 月历矩阵：表头 周一…周日 */
    .cal-wrap{margin-top:8px}
    .cal-header{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
      margin-bottom:10px;
      font-size:11px;
      font-weight:500;
      color:var(--muted);
      text-align:center;
      letter-spacing:0.06em;
    }
    .cal-cells{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
    }
    .cal-cell{
      min-height:76px;
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      padding:6px 6px 8px;
      background:rgba(255,255,255,.88);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:4px;
      transition:box-shadow .2s, border-color .2s, transform .15s;
    }
    .cal-cell:hover{
      box-shadow:var(--shadow-sm);
      border-color:#c4b5fd;
      transform:translateY(-1px);
    }
    .cal-cell.other-month{
      background:rgba(241, 245, 249, 0.75);
      color:#94a3b8;
    }
    .cal-cell .day-num{font-size:12px;font-weight:500;text-align:left;color:#475569}
    .cal-cell.other-month .day-num{color:#94a3b8}
    .cal-cell .meat-mini{
      font-size:10px;
      font-weight:400;
      line-height:1.35;
      color:var(--muted);
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      word-break:break-all;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="panel header">
      <div class="title">一周三补营养食谱（1岁+）</div>
      <div class="tabs">
        <button type="button" class="tab" id="tabMonth">月视图</button>
        <button type="button" class="tab" id="tabWeek">周视图</button>
        <button type="button" class="tab" id="tabDay">日视图</button>
      </div>
    </div>

    <div class="panel" id="viewPanel">
      <div class="section-title" id="viewTitle">视图</div>
      <div id="viewList" class="list"></div>
      <div id="dayDetail" class="hidden"></div>
    </div>

    <div class="panel edit" id="editPanel">
      <div class="section-title" id="currentEdit">当前编辑：</div>
      <div class="chips" id="selectedChips"></div>
      <div class="tip">提示：可将本餐主角食材放在第一位，便于月/周视图格子内展示当日肉类。</div>
      <div class="name-block">
        <div class="name-item" id="autoName">自动生成菜谱名称：</div>
        <div class="name-item">
          自定义菜谱名称：
          <input id="customNameInput" placeholder="请输入菜名" />
        </div>
      </div>
    </div>

    <div class="panel catalog">
      <div class="section-title">食材库（在各分类内输入并添加；全库名称不可重复）</div>
      <div class="cat cat--meat">
        <div class="cat-head">
          <div class="cat-title">🩸肉类</div>
        </div>
        <div class="cat-items" id="meatItems"></div>
        <div class="cat-add-row">
          <input type="text" id="inputMeat" placeholder="输入肉类名称" autocomplete="off" />
          <button type="button" class="btn primary" id="btnSubmitMeat">添加</button>
        </div>
      </div>
      <div class="cat cat--veg">
        <div class="cat-head">
          <div class="cat-title">🥬蔬菜</div>
        </div>
        <div class="cat-items" id="vegItems"></div>
        <div class="cat-add-row">
          <input type="text" id="inputVeg" placeholder="输入蔬菜名称" autocomplete="off" />
          <button type="button" class="btn primary" id="btnSubmitVeg">添加</button>
        </div>
      </div>
      <div class="cat cat--staple">
        <div class="cat-head">
          <div class="cat-title">🍚主食</div>
        </div>
        <div class="cat-items" id="stapleItems"></div>
        <div class="cat-add-row">
          <input type="text" id="inputStaple" placeholder="输入主食名称" autocomplete="off" />
          <button type="button" class="btn primary" id="btnSubmitStaple">添加</button>
        </div>
      </div>
      <div class="hint" id="weekHint">周判定提示会显示在这里</div>
    </div>

    <div class="panel">
      <div class="action-row">
        <button type="button" class="btn warn" id="btnClearMeal">清空本餐</button>
        <button type="button" class="btn primary" id="btnSave">保存</button>
        <button type="button" class="btn" id="btnBalance">自动平衡营养</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "nutrition_meal_planner_v3";
    const mealKeys = ["早餐", "午餐", "晚餐"];
    const WEEK_HEADER = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];

    function defaultCatalog() {
      return {
        meat: [
          { id: "beef", label: "牛肉" },
          { id: "pork", label: "猪肉" },
          { id: "chicken", label: "鸡肉" },
          { id: "cod", label: "鳕鱼" },
          { id: "salmon", label: "三文鱼" },
          { id: "shrimp", label: "虾" }
        ],
        veg: [
          { id: "carrot", label: "胡萝卜" },
          { id: "spinach", label: "菠菜" },
          { id: "pumpkin", label: "南瓜" },
          { id: "broccoli", label: "西兰花" },
          { id: "bokchoy", label: "油菜" }
        ],
        staple: [
          { id: "rice", label: "米饭" },
          { id: "noodle", label: "面条" },
          { id: "millet", label: "小米" },
          { id: "oat", label: "燕麦" },
          { id: "bread", label: "面包" },
          { id: "egg", label: "鸡蛋" },
          { id: "milk", label: "牛奶" }
        ]
      };
    }

    let catalog = defaultCatalog();
    const itemLabelMap = {};

    function rebuildLabelMap() {
      for (const k of Object.keys(itemLabelMap)) delete itemLabelMap[k];
      Object.values(catalog).flat().forEach(item => { itemLabelMap[item.id] = item.label; });
    }

    let recipeNames = {};

    const monthYear = 2026;
    const monthNum = 4;

    let viewMode = "month";
    let selectedDate = "2026-04-10";
    let selectedMeal = "午餐";

    let scheduleByDate = {};

    function toDateObj(dateStr) {
      const [y, m, d] = dateStr.split("-").map(Number);
      return new Date(y, m - 1, d);
    }
    function toDateStr(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }
    function addDays(dateStr, n) {
      const dt = toDateObj(dateStr);
      dt.setDate(dt.getDate() + n);
      return toDateStr(dt);
    }
    /** 周一为 0，周日为 6 */
    function getMondayBasedDow(dateObj) {
      return (dateObj.getDay() + 6) % 7;
    }
    function getWeekStart(dateStr) {
      const dt = toDateObj(dateStr);
      const dow = getMondayBasedDow(dt);
      dt.setDate(dt.getDate() - dow);
      return toDateStr(dt);
    }
    function getWeekDates(dateStr) {
      const start = getWeekStart(dateStr);
      return Array.from({ length: 7 }, (_, i) => addDays(start, i));
    }
    function getWeekdayCN(dateStr) {
      const map = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
      return map[toDateObj(dateStr).getDay()];
    }
    function fmtCNDate(dateStr) {
      const dt = toDateObj(dateStr);
      return `${dt.getMonth() + 1}月${dt.getDate()}日`;
    }

    /** 生成当月日历矩阵（含首尾补位），周一为第一列 */
    function getMonthMatrixCells(year, month) {
      const first = new Date(year, month - 1, 1);
      const lastDay = new Date(year, month, 0).getDate();
      const startDow = getMondayBasedDow(first);
      const cells = [];

      const prevMonthLast = new Date(year, month - 1, 0).getDate();
      for (let i = 0; i < startDow; i++) {
        const day = prevMonthLast - startDow + i + 1;
        const dt = new Date(year, month - 2, day);
        cells.push({ dateStr: toDateStr(dt), inCurrentMonth: false });
      }
      for (let d = 1; d <= lastDay; d++) {
        const dt = new Date(year, month - 1, d);
        cells.push({ dateStr: toDateStr(dt), inCurrentMonth: true });
      }
      const pad = (7 - (cells.length % 7)) % 7;
      let n = 1;
      const ny = month === 12 ? year + 1 : year;
      const nm = month === 12 ? 1 : month + 1;
      for (let i = 0; i < pad; i++) {
        const dt = new Date(ny, nm - 1, n++);
        cells.push({ dateStr: toDateStr(dt), inCurrentMonth: false });
      }
      return cells;
    }

    function ensureDateMeals(dateStr) {
      if (!scheduleByDate[dateStr]) {
        scheduleByDate[dateStr] = { 早餐: [], 午餐: [], 晚餐: [] };
      }
      return scheduleByDate[dateStr];
    }
    function getCurrentItems() {
      return ensureDateMeals(selectedDate)[selectedMeal];
    }
    function setCurrentItems(items) {
      ensureDateMeals(selectedDate)[selectedMeal] = items;
    }

    function buildDefaultMonthData() {
      const cells = getMonthMatrixCells(monthYear, monthNum);
      cells.forEach(c => ensureDateMeals(c.dateStr));

      ensureDateMeals("2026-04-10").早餐 = ["egg", "milk", "bread"];
      ensureDateMeals("2026-04-10").午餐 = ["beef", "carrot", "rice"];
      ensureDateMeals("2026-04-10").晚餐 = ["cod", "spinach", "pumpkin"];

      ensureDateMeals("2026-04-08").午餐 = ["chicken", "broccoli", "rice"];
      ensureDateMeals("2026-04-09").午餐 = ["pork", "carrot", "noodle"];
      ensureDateMeals("2026-04-11").午餐 = ["shrimp", "pumpkin", "rice"];
      ensureDateMeals("2026-04-12").午餐 = ["salmon", "spinach", "millet"];
    }

    function getDateMealKey(dateStr, meal) {
      return `${dateStr}_${meal}`;
    }

    function getAutoDishName(items) {
      if (!items.length) return "暂无菜谱";
      const labels = items.map(id => itemLabelMap[id] || id);
      const core = labels.slice(0, 2).join("");
      if (items.includes("rice")) return `${core}烩饭`;
      if (items.includes("noodle")) return `${core}面`;
      if (items.includes("millet")) return `${core}粥`;
      if (items.includes("cod") || items.includes("salmon")) return `${core}配蔬菜`;
      return `${core}拼盘`;
    }

    function isMeat(itemId) {
      return catalog.meat.some(m => m.id === itemId);
    }

    function getDayMeatSummary(dateStr) {
      const meals = ensureDateMeals(dateStr);
      const all = [...meals.早餐, ...meals.午餐, ...meals.晚餐];
      const uniqMeat = [...new Set(all.filter(isMeat))];
      if (!uniqMeat.length) return "暂无肉类";
      return uniqMeat.map(id => itemLabelMap[id] || id).join(" / ");
    }

    function getWeeklyMeatHint(itemId) {
      const weekDates = getWeekDates(selectedDate);
      const selectedDay = toDateObj(selectedDate).getTime();
      const eatenBefore = [];
      const eatenThisWeekSet = new Set();

      for (const dateStr of weekDates) {
        const meals = ensureDateMeals(dateStr);
        const all = [...meals.早餐, ...meals.午餐, ...meals.晚餐];
        const dayMeat = new Set(all.filter(isMeat));
        dayMeat.forEach(id => eatenThisWeekSet.add(id));

        if (toDateObj(dateStr).getTime() < selectedDay && dayMeat.has(itemId)) {
          eatenBefore.push(getWeekdayCN(dateStr));
        }
      }

      const notEaten = catalog.meat
        .map(m => m.id)
        .filter(id => !eatenThisWeekSet.has(id))
        .map(id => itemLabelMap[id]);

      return { eatenBefore, notEaten };
    }

    function normalizeLabel(s) {
      return String(s || "").trim().toLowerCase();
    }

    function labelExistsInCatalog(label) {
      const n = normalizeLabel(label);
      if (!n) return true;
      return Object.values(catalog).flat().some(
        item => normalizeLabel(item.label) === n
      );
    }

    function generateIngredientId(label) {
      const base = label.trim().replace(/\s+/g, "_").replace(/[^\w\u4e00-\u9fa5]/g, "") || "item";
      return `ing_${base.slice(0, 20)}_${Date.now().toString(36)}`;
    }

    function addIngredientToCategory(categoryKey, rawLabel) {
      const label = String(rawLabel || "").trim();
      if (!label) {
        updateWeekHint("请输入食材名称。");
        return false;
      }
      if (labelExistsInCatalog(label)) {
        updateWeekHint(`「${label}」已在食材库中存在，无法重复添加。`);
        return false;
      }
      const id = generateIngredientId(label);
      catalog[categoryKey].push({ id, label });
      itemLabelMap[id] = label;
      updateWeekHint(`已加入${categoryKey === "meat" ? "肉类" : categoryKey === "veg" ? "蔬菜" : "主食"}：${label}`);
      return true;
    }

    function saveState() {
      const payload = {
        version: 3,
        scheduleByDate,
        recipeNames,
        catalog,
        selectedDate,
        selectedMeal,
        viewMode
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        if (!parsed || !parsed.scheduleByDate) return false;
        scheduleByDate = parsed.scheduleByDate;
        recipeNames = parsed.recipeNames || {};
        if (parsed.catalog && parsed.catalog.meat && parsed.catalog.veg && parsed.catalog.staple) {
          catalog = parsed.catalog;
        }
        rebuildLabelMap();
        selectedDate = parsed.selectedDate || selectedDate;
        selectedMeal = parsed.selectedMeal || selectedMeal;
        viewMode = parsed.viewMode || viewMode;
        return true;
      } catch {
        return false;
      }
    }

    function renderTabs() {
      const tabs = {
        month: document.getElementById("tabMonth"),
        week: document.getElementById("tabWeek"),
        day: document.getElementById("tabDay")
      };
      Object.entries(tabs).forEach(([mode, el]) => {
        el.classList.toggle("active", mode === viewMode);
      });
    }

    function renderMonthGrid(container) {
      container.innerHTML = "";
      const wrap = document.createElement("div");
      wrap.className = "cal-wrap";

      const head = document.createElement("div");
      head.className = "cal-header";
      head.innerHTML = WEEK_HEADER.map(h => `<div>${h}</div>`).join("");
      wrap.appendChild(head);

      const grid = document.createElement("div");
      grid.className = "cal-cells";
      const cells = getMonthMatrixCells(monthYear, monthNum);
      cells.forEach(({ dateStr, inCurrentMonth }) => {
        const cell = document.createElement("div");
        cell.className = "cal-cell" + (inCurrentMonth ? "" : " other-month");
        const d = toDateObj(dateStr).getDate();
        cell.innerHTML = `<div class="day-num">${d}</div><div class="meat-mini">${getDayMeatSummary(dateStr)}</div>`;
        cell.addEventListener("click", () => {
          selectedDate = dateStr;
          viewMode = "week";
          renderAll();
        });
        grid.appendChild(cell);
      });
      wrap.appendChild(grid);
      container.appendChild(wrap);
    }

    function renderView() {
      renderTabs();
      const viewTitle = document.getElementById("viewTitle");
      const viewList = document.getElementById("viewList");
      const dayDetail = document.getElementById("dayDetail");
      viewList.innerHTML = "";
      dayDetail.innerHTML = "";
      dayDetail.classList.add("hidden");

      if (viewMode === "month") {
        viewTitle.textContent = `月视图（${monthYear}年${monthNum}月）· 周一至周日 · 点击日期进入该周`;
        renderMonthGrid(viewList);
        return;
      }

      if (viewMode === "week") {
        const weekDates = getWeekDates(selectedDate);
        viewTitle.textContent = `周视图（${fmtCNDate(weekDates[0])} - ${fmtCNDate(weekDates[6])}）· 点击某天进入日视图`;
        weekDates.forEach(dateStr => {
          const row = document.createElement("div");
          row.className = "row" + (dateStr === selectedDate ? " active" : "");
          row.innerHTML = `<span class="left">${getWeekdayCN(dateStr)} ${fmtCNDate(dateStr)}</span><span class="right">${getDayMeatSummary(dateStr)}</span>`;
          row.addEventListener("click", () => {
            selectedDate = dateStr;
            viewMode = "day";
            renderAll();
          });
          viewList.appendChild(row);
        });
        return;
      }

      viewTitle.textContent = `日视图（${fmtCNDate(selectedDate)}）`;
      dayDetail.classList.remove("hidden");
      const meals = ensureDateMeals(selectedDate);
      const blocks = mealKeys.map(meal => {
        const key = getDateMealKey(selectedDate, meal);
        const custom = (recipeNames[key] || "").trim();
        if (custom) {
          return `<div class="meal-line"><strong>${meal}：</strong>${custom}</div>`;
        }
        const labels = meals[meal].map(id => itemLabelMap[id] || id).join(" + ") || "暂无";
        return `<div class="meal-line"><strong>${meal}：</strong>${labels}</div>`;
      }).join("");
      dayDetail.innerHTML = blocks;
    }

    function renderEdit() {
      const currentEdit = document.getElementById("currentEdit");
      currentEdit.textContent = `编辑当前餐食：${fmtCNDate(selectedDate)} · ${selectedMeal}`;

      const chips = document.getElementById("selectedChips");
      chips.innerHTML = "";
      const items = getCurrentItems();
      items.forEach((id, idx) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.innerHTML = `<span>${itemLabelMap[id] || id}</span>`;

        if (idx > 0) {
          const up = document.createElement("button");
          up.className = "x";
          up.textContent = "↑";
          up.title = "前移";
          up.addEventListener("click", () => {
            const next = items.slice();
            [next[idx - 1], next[idx]] = [next[idx], next[idx - 1]];
            setCurrentItems(next);
            renderAll();
          });
          chip.appendChild(up);
        }

        const del = document.createElement("button");
        del.className = "x";
        del.textContent = "×";
        del.title = "删除";
        del.addEventListener("click", () => {
          const next = items.slice();
          next.splice(idx, 1);
          setCurrentItems(next);
          renderAll();
        });
        chip.appendChild(del);
        chips.appendChild(chip);
      });

      const autoName = getAutoDishName(items);
      document.getElementById("autoName").textContent = `自动生成菜谱名称：${autoName}`;

      const key = getDateMealKey(selectedDate, selectedMeal);
      const customInput = document.getElementById("customNameInput");
      customInput.value = recipeNames[key] || "";
    }

    function renderCatalog() {
      const meatItems = document.getElementById("meatItems");
      const vegItems = document.getElementById("vegItems");
      const stapleItems = document.getElementById("stapleItems");
      meatItems.innerHTML = "";
      vegItems.innerHTML = "";
      stapleItems.innerHTML = "";

      const renderButtons = (target, items, type) => {
        items.forEach(item => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "btn-chip";
          btn.textContent = item.label;
          btn.addEventListener("click", () => handleAddIngredient(item.id, type));
          target.appendChild(btn);
        });
      };

      renderButtons(meatItems, catalog.meat, "meat");
      renderButtons(vegItems, catalog.veg, "veg");
      renderButtons(stapleItems, catalog.staple, "staple");
    }

    function handleAddIngredient(itemId, type) {
      const current = getCurrentItems().slice();
      if (current.includes(itemId)) {
        updateWeekHint("该食材已在本餐中。");
        return;
      }
      current.push(itemId);
      setCurrentItems(current);

      if (type === "meat") {
        const hint = getWeeklyMeatHint(itemId);
        const itemLabel = itemLabelMap[itemId] || itemId;
        let msg = "";
        if (hint.eatenBefore.length) {
          msg += `${itemLabel}已在${hint.eatenBefore.join("、")}吃过。`;
        } else {
          msg += `${itemLabel}本周此前未出现。`;
        }
        msg += hint.notEaten.length
          ? ` 本周尚未吃过：${hint.notEaten.join("、")}。`
          : " 本周肉类已全部覆盖。";
        updateWeekHint(msg);
      } else {
        updateWeekHint(`已添加：${itemLabelMap[itemId] || itemId}`);
      }

      renderAll();
    }

    function updateWeekHint(text) {
      document.getElementById("weekHint").textContent = text;
    }

    function autoBalanceNutrition() {
      const items = getCurrentItems().slice();
      const hasMeat = items.some(isMeat);
      const hasVeg = items.some(id => catalog.veg.some(v => v.id === id));
      const hasStaple = items.some(id => catalog.staple.some(s => s.id === id));

      if (!hasMeat) items.push("beef");
      if (!hasVeg) items.push("carrot");
      if (!hasStaple) items.push("rice");

      setCurrentItems([...new Set(items)]);
      updateWeekHint("已自动平衡为：肉类 + 蔬菜 + 主食。");
      renderAll();
    }

    function renderAll() {
      renderView();
      renderEdit();
      renderCatalog();
      document.getElementById("customNameInput").oninput = (e) => {
        recipeNames[getDateMealKey(selectedDate, selectedMeal)] = e.target.value.trim();
      };
    }

    document.getElementById("tabMonth").addEventListener("click", () => { viewMode = "month"; renderAll(); });
    document.getElementById("tabWeek").addEventListener("click", () => { viewMode = "week"; renderAll(); });
    document.getElementById("tabDay").addEventListener("click", () => { viewMode = "day"; renderAll(); });

    document.getElementById("btnSave").addEventListener("click", () => {
      saveState();
      updateWeekHint("已保存当前配置。");
    });
    document.getElementById("btnClearMeal").addEventListener("click", () => {
      setCurrentItems([]);
      renderAll();
      updateWeekHint("本餐已清空。");
    });
    document.getElementById("btnBalance").addEventListener("click", autoBalanceNutrition);

    document.getElementById("btnSubmitMeat").addEventListener("click", () => {
      const v = document.getElementById("inputMeat").value;
      if (addIngredientToCategory("meat", v)) document.getElementById("inputMeat").value = "";
      renderAll();
    });
    document.getElementById("btnSubmitVeg").addEventListener("click", () => {
      const v = document.getElementById("inputVeg").value;
      if (addIngredientToCategory("veg", v)) document.getElementById("inputVeg").value = "";
      renderAll();
    });
    document.getElementById("btnSubmitStaple").addEventListener("click", () => {
      const v = document.getElementById("inputStaple").value;
      if (addIngredientToCategory("staple", v)) document.getElementById("inputStaple").value = "";
      renderAll();
    });

    function init() {
      if (!loadState()) {
        catalog = defaultCatalog();
        rebuildLabelMap();
        buildDefaultMonthData();
      } else {
        const cells = getMonthMatrixCells(monthYear, monthNum);
        cells.forEach(c => ensureDateMeals(c.dateStr));
      }
      renderAll();
      updateWeekHint("月视图：点击日期进入该周；周视图：点击日期进入当日。肉类可查看本周提示。");
    }

    rebuildLabelMap();
    init();
  </script>
</body>
</html>
